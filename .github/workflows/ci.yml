name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install (dev)
        run: uv sync --group dev
      - name: Lint (ruff)
        run: uv run ruff check src/ tests/
      - name: Unit tests (pytest, no WLC needed)
        run: uv run pytest -q
